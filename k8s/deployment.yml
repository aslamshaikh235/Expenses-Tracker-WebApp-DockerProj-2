apiVersion: apps/v1
kind: Deployment
metadata:
  name: expenses-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expenses
  template:
    metadata:
      labels:
        app: expenses
    spec:
      containers:
        - name: expenses-app
          image: aslamshaikh235/expenses-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_USER
              value: "root"
            - name: DB_PASS
              value: "root"
